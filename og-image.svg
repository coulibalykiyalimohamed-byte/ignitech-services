<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Fond bleu foncé -->
  <rect width="1200" height="630" fill="#1B3A5C"/>
  
  <!-- Dégradé subtil -->
  <radialGradient id="bg" cx="30%" cy="50%" r="70%">
    <stop offset="0%" stop-color="#1B3A5C"/>
    <stop offset="100%" stop-color="#0F2236"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Cercle décoratif arrière -->
  <circle cx="950" cy="315" r="280" fill="none" stroke="#E8650A" stroke-width="1" opacity="0.15"/>
  <circle cx="950" cy="315" r="220" fill="none" stroke="#E8650A" stroke-width="1" opacity="0.1"/>

  <!-- Flamme -->
  <g transform="translate(880, 130) scale(2.2)">
    <path d="M30 120 C30 120 5 95 8 65 C10 48 20 38 26 28 C26 28 24 45 32 52 C32 52 27 35 38 20 C38 20 36 42 48 50 C48 50 42 32 52 22 C52 22 66 38 64 62 C70 52 69 38 69 38 C76 52 78 68 70 86 C65 100 54 112 48 120 C48 120 52 104 49 90 C43 104 40 115 30 120Z" fill="#E8650A"/>
    <path d="M38 112 C38 112 24 90 27 68 C29 56 36 48 39 38 C39 38 38 52 43 58 C43 58 40 44 47 34 C47 34 50 48 47 62 C51 54 50 42 50 42 C54 52 55 64 51 78 C48 88 43 98 40 104 C40 104 43 92 41 82 C37 94 37 104 38 112Z" fill="#F4841A" opacity="0.5"/>
  </g>

  <!-- Flocon -->
  <g transform="translate(1010, 200) scale(1.8)" stroke="#7EC8E3" stroke-linecap="round">
    <line x1="30" y1="0" x2="30" y2="60" stroke-width="6"/>
    <line x1="0" y1="30" x2="60" y2="30" stroke-width="6"/>
    <line x1="8" y1="8" x2="52" y2="52" stroke-width="6"/>
    <line x1="52" y1="8" x2="8" y2="52" stroke-width="6"/>
    <line x1="30" y1="0" x2="20" y2="12" stroke-width="4"/>
    <line x1="30" y1="0" x2="40" y2="12" stroke-width="4"/>
    <line x1="30" y1="60" x2="20" y2="48" stroke-width="4"/>
    <line x1="30" y1="60" x2="40" y2="48" stroke-width="4"/>
    <line x1="0" y1="30" x2="12" y2="20" stroke-width="4"/>
    <line x1="0" y1="30" x2="12" y2="40" stroke-width="4"/>
    <line x1="60" y1="30" x2="48" y2="20" stroke-width="4"/>
    <line x1="60" y1="30" x2="48" y2="40" stroke-width="4"/>
  </g>

  <!-- Ligne orange décorative -->
  <rect x="80" y="180" width="60" height="4" fill="#E8650A" rx="2"/>

  <!-- Logo texte -->
  <text x="80" y="155" font-family="Georgia, serif" font-size="58" font-weight="bold" fill="white" letter-spacing="2">IGNITECH</text>
  <text x="82" y="185" font-family="Arial, sans-serif" font-size="16" fill="#7EC8E3" letter-spacing="8">S E R V I C E S</text>

  <!-- Titre principal -->
  <text x="80" y="290" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="white">Réparation &amp; Installation</text>
  <text x="80" y="345" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="#E8650A">Industrielle — Abidjan</text>

  <!-- Ligne séparatrice -->
  <rect x="80" y="375" width="700" height="2" fill="#7EC8E3" opacity="0.3" rx="1"/>

  <!-- Description -->
  <text x="80" y="415" font-family="Arial, sans-serif" font-size="22" fill="#CBD5E0">Spécialiste fours industriels, chambres froides, gaz,</text>
  <text x="80" y="448" font-family="Arial, sans-serif" font-size="22" fill="#CBD5E0">climatisation &amp; électroménagers. Vente de pièces</text>
  <text x="80" y="481" font-family="Arial, sans-serif" font-size="22" fill="#CBD5E0">neuves et occasion. Intervention partout en Côte</text>
  <text x="80" y="514" font-family="Arial, sans-serif" font-size="22" fill="#E8650A" font-weight="bold">d'Ivoire et au-delà. 🇨🇮</text>

  <!-- URL -->
  <text x="80" y="580" font-family="Arial, sans-serif" font-size="18" fill="#7EC8E3" opacity="0.8">🌐 ignitech-services.netlify.app</text>
</svg>
